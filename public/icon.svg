<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Soundwave bars behind the note -->
  <g opacity="0.25" fill="#fff">
    <rect x="80" y="200" width="16" height="112" rx="8"/>
    <rect x="112" y="160" width="16" height="192" rx="8"/>
    <rect x="144" y="190" width="16" height="132" rx="8"/>
    <rect x="352" y="190" width="16" height="132" rx="8"/>
    <rect x="384" y="160" width="16" height="192" rx="8"/>
    <rect x="416" y="200" width="16" height="112" rx="8"/>
  </g>
  <!-- Music note -->
  <g fill="url(#note)">
    <rect x="210" y="120" width="20" height="220" rx="4"/>
    <rect x="280" y="100" width="20" height="200" rx="4"/>
    <path d="M210 120 h90 v30 h-90 z" rx="4"/>
    <circle cx="200" cy="340" r="48"/>
    <circle cx="270" cy="300" r="48"/>
  </g>
  <!-- Vinyl circle accent -->
  <circle cx="200" cy="340" r="16" fill="url(#bg)" opacity="0.6"/>
  <circle cx="270" cy="300" r="16" fill="url(#bg)" opacity="0.6"/>
</svg>
